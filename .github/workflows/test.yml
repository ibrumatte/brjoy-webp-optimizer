name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        pip install pillow
    
    - name: Run tests
      run: |
        chmod +x test.sh
        ./test.sh
    
    - name: Syntax check
      run: python3 -m py_compile brjoy-converter
