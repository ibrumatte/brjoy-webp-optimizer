name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick
        pip install pillow
    
    - name: Run tests
      run: |
        chmod +x test.sh
        ./test.sh
    
    - name: Syntax check
      run: python3 -m py_compile brjoy-converter conversor_gui.py test-core-logic.py test-conversion.py
